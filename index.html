<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Todo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="gantt-section" class="gantt-section collapsed">
      <div class="gantt-header" id="gantt-toggle-btn">
        <span class="gantt-chevron">&#8964;</span>
      </div>
      <div class="gantt-body">
        <div class="gantt-controls">
          <button class="gantt-view-btn active" data-mode="Week">週</button>
          <button class="gantt-view-btn" data-mode="Month">月</button>
        </div>
        <div id="gantt-container"></div>
      </div>
    </div>

    <div class="container">
      <h1>TODO</h1>

      <form id="todo-form">
        <div class="form-row">
          <input
            type="text"
            id="todo-input"
            placeholder="タスクを入力..."
            autocomplete="off"
          />
          <input type="date" id="due-date-input" />
          <button type="submit">追加</button>
        </div>
      </form>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="active">未完了</button>
        <button class="filter-btn" data-filter="completed">完了済み</button>
      </div>

      <ul id="todo-list"></ul>

      <div class="footer">
        <span id="remaining">0件残っています</span>
        <button id="clear-completed">完了済みを削除</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
